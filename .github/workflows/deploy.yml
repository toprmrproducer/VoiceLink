name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-push:
    name: Build & push ${{ matrix.app }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: api
            dockerfile: apps/api/Dockerfile
            image: voice-platform-api
          - app: ui
            dockerfile: apps/ui/Dockerfile
            image: voice-platform-ui
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Compute lowercase owner
        id: owner
        run: echo "lc=${OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}
          tags: |
            ghcr.io/${{ steps.owner.outputs.lc }}/${{ matrix.image }}:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.lc }}/${{ matrix.image }}:latest

  deploy:
    name: Deploy to VPS-1
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Compute lowercase owner
        id: owner
        run: echo "lc=${OWNER,,}" >> "$GITHUB_OUTPUT"
        env:
          OWNER: ${{ github.repository_owner }}
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/voiceplatform
            export GH_OWNER=${{ steps.owner.outputs.lc }}
            export TAG=${{ github.sha }}
            # GHCR pull needs auth on private packages — public on first push,
            # but logged-in pull is robust either way.
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f docker-compose.prod.yml pull api ui caddy mongo redis
            docker compose -f docker-compose.prod.yml up -d
            # Wait for api to be healthy
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.prod.yml exec -T api wget -qO- http://localhost:4000/health >/dev/null 2>&1; then
                echo "api healthy after ${i}s"
                break
              fi
              sleep 1
            done
            # Smoke test through Caddy
            curl -fsS https://api.auto4you.in/health
